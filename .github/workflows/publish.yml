name: Publish Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [linux-x64, win-x64, osx-x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore weather.csproj

      - name: Publish ${{ matrix.rid }}
        shell: bash
        run: |
          set -euo pipefail
          output_dir="artifacts/weather-${{ matrix.rid }}"

          dotnet publish weather.csproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained false \
            /p:PublishSingleFile=true \
            /p:DebugType=none \
            --output "$output_dir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-${{ matrix.rid }}
          path: artifacts/weather-${{ matrix.rid }}
