name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore weather.csproj

      - name: Build
        run: dotnet build weather.csproj --configuration Release --no-restore

      - name: Test (if test projects exist)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_projects < <(find . -type f -name "*Tests.csproj")

          if [[ ${#test_projects[@]} -eq 0 ]]; then
            echo "No test projects found. Skipping tests."
            exit 0
          fi

          for test_project in "${test_projects[@]}"; do
            dotnet test "$test_project" --configuration Release --no-build --verbosity normal
          done
